<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>
    <style>
        body{
            background: url("./Back.png");
            background-repeat: no-repeat;
            background-size: 90%;
            background-attachment: fixed;
        }
        .ring {
  width: 80px;
  height: 80px;
  border: 4px solid white;
  border-radius: 50%;
  background: transparent;
  position: relative;
  animation: growFade 1.5s infinite;
  margin: 40px auto;
}
.c{
    position: absolute;
    width: 50%;
    height: 50%;
   border: 4px solid white;
  border-radius: 50%;
  background: transparent;
  animation: growFade 1.5s infinite;
  position: relative;
  margin:50%;
}
     .ring1 {
  width: 80px;
  height: 80px;
  border: 4px solid white;
  border-radius: 50%;
  background: transparent;
  animation: growFade 1.5s infinite;
  position: relative;
  margin-left: 20px auto;
}
.c1{
    position: absolute;
    width: 50%;
    height: 50%;
   border: 4px solid white;
  border-radius: 50%;
  background: transparent;
  animation: growFade 1.5s infinite;
  position: relative;
  margin:50%;
}
@keyframes growFade {
  0% {
    transform: scale(0.7);
    opacity: 1;
  }
  70% {
    transform: scale(1.2);
    opacity: 0.5;
  }
  100% {
    transform: scale(1.4);
    opacity: 0;
  }}
    </style>
</head>
<body>
    <div class="ring">
        <div class="c"></div>
    </div>
    <div class="ring1">
        <div class="c1"></div>
    </div>
</body>
</html>
